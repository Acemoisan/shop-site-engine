<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Inter", system-ui, sans-serif;
    background: #14141f;
    color: #f5f5fa;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 90px;
  }
  .glow1 { position: absolute; left: 55%; top: -30%; width: 900px; height: 900px; border-radius: 50%;
    background: radial-gradient(closest-side, #5b4fe6, transparent 70%); opacity: .45; filter: blur(40px); }
  .glow2 { position: absolute; right: -8%; bottom: -25%; width: 520px; height: 520px; border-radius: 50%;
    background: radial-gradient(closest-side, #6fe0ee, transparent 70%); opacity: .28; filter: blur(40px); }
  .dots { position: absolute; inset: 0; opacity: .06;
    background-image: radial-gradient(#fff 1.5px, transparent 1.5px); background-size: 30px 30px; }
  .brand { position: relative; display: flex; align-items: center; gap: 16px; font-family: "Space Grotesk";
    font-weight: 700; font-size: 34px; letter-spacing: -.01em; }
  .mark { width: 44px; height: 44px; border-radius: 13px; background: #5b4fe6; display: grid; place-items: center; }
  .mark span { width: 16px; height: 16px; border-radius: 50%; background: #6fe0ee; box-shadow: 0 0 0 3px rgba(255,255,255,.4); }
  h1 { position: relative; font-family: "Space Grotesk"; font-weight: 700; font-size: 86px; line-height: .98;
    letter-spacing: -.025em; margin-top: 54px; }
  h1 em { font-style: normal; color: #b9b2ff; }
  p { position: relative; font-size: 30px; color: rgba(245,245,250,.72); margin-top: 30px; max-width: 880px; line-height: 1.35; }
  .pills { position: relative; display: flex; gap: 14px; margin-top: 44px; }
  .pill { font-size: 21px; font-weight: 500; color: rgba(245,245,250,.85); border: 1px solid rgba(255,255,255,.2);
    border-radius: 999px; padding: 11px 22px; display: flex; align-items: center; gap: 9px; }
  .pill b { color: #6fe0ee; }
</style>
</head>
<body>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="dots"></div>
  <div class="brand"><span class="mark"><span></span></span> Studio0rbit</div>
  <h1>Websites for Calgary shops.<br><em>Built fast. Owned by you.</em></h1>
  <p>One fair price, no monthly fees — you own the site, the domain, everything.</p>
  <div class="pills">
    <div class="pill"><b>✦</b> You own everything</div>
    <div class="pill"><b>✦</b> Live in days</div>
    <div class="pill"><b>✦</b> $0/mo to us</div>
  </div>
</body>
</html>
