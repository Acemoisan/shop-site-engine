        - 'heading "Timeline Expectations: From Quote to Launch" [level=3] [ref=e195]'
        - generic [ref=e196]:
          - generic [ref=e197]: 4–8 weeks
          - paragraph [ref=e198]: Typical timeline for a professional small business website in Calgary, from signed contract to live launch. Complex projects may take 10-14 weeks.
        - paragraph [ref=e199]: The biggest delays almost always come from content. Designers can build your site structure in days, but waiting six weeks for you to send headshots, approve copy, or finalize your service descriptions pushes every project behind schedule. Having your content ready (or hiring your designer to create it) is the single best thing you can do to stay on timeline.
        - generic [ref=e200]:
          - heading "Ready for transparent, no-nonsense pricing?" [level=3] [ref=e201]
          - paragraph [ref=e202]: Tell us about your Calgary business, and we'll send you a detailed breakdown of costs, timelines, and exactly what's included—within 24 hours. Plus, we'll show you how automation and local SEO can make your website your hardest-working employee.
          - link "Get Your Free Quote" [ref=e203] [cursor=pointer]:
