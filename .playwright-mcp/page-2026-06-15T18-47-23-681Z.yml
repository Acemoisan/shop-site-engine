        - paragraph [ref=e185]: That gives you a realistic range to bring into conversations with designers.
        - heading "What Information Calgary Web Designers Need from You" [level=3] [ref=e186]
        - paragraph [ref=e187]: "Want an accurate quote fast? Come prepared with:"
        - list [ref=e188]:
          - listitem [ref=e189]: A rough page count and list of features you need
          - listitem [ref=e190]: 2-3 competitor or aspirational websites you admire
          - listitem [ref=e191]: Your existing branding assets (logo, colours, fonts) or whether you need them created
          - listitem [ref=e192]: Whether you have written content and photos ready, or need help creating them
          - listitem [ref=e193]: Your ideal timeline and budget range (being upfront saves everyone time)
